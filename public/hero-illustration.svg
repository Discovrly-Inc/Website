    <path d="M50 394c0-3 2.2-5 4.5-5 1.3 0 2.5.6 3.2 1.6.4-.3 1-.4 1.4-.4 1.8 0 3.2 1.4 3.2 3.2 0 .2 0 .3-.04.5.6.5 1 1.1 1 1.8 0 1.4-1.2 2.5-2.5 2.5h-9c-1.4 0-2.6-1.1-2.6-2.5 0-.9.5-1.6 1.2-2-.1-.2-.15-.4-.15-.6 0-.3.1-.7.2-1z" fill="white"/>
