  <circle cx="495" cy="200" r="18" fill="white" opacity="0.15"/>
  <text x="495" y="206" text-anchor="middle" font-size="20" fill="white" font-family="system-ui">⚡</text>
  <text x="495" y="244" text-anchor="middle" font-size="19" font-weight="700" fill="white" font-family="system-ui" letter-spacing="-0.02em">Discovrly</text>
  <text x="495" y="266" text-anchor="middle" font-size="11" fill="#c7d2fe" font-family="system-ui" letter-spacing="0.04em">AI Research OS</text>
  <rect x="422" y="167" width="146" height="126" rx="14" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>

