  <path d="M216 157 C300 157, 350 200, 410 210" stroke="url(#pathIn)" stroke-width="1.5" stroke-dasharray="6 4" fill="none"/>
  <path d="M216 237 C300 237, 350 225, 410 228" stroke="url(#pathIn)" stroke-width="1.5" stroke-dasharray="6 4" fill="none"/>
  <path d="M216 317 C300 317, 350 255, 410 248" stroke="url(#pathIn)" stroke-width="1.5" stroke-dasharray="6 4" fill="none"/>
  <path d="M216 397 C300 397, 340 270, 410 260" stroke="url(#pathIn)" stroke-width="1.5" stroke-dasharray="6 4" fill="none"/>

