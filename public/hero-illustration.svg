  <path d="M580 195 C640 195, 660 115, 720 115" stroke="url(#pathOut)" stroke-width="2" fill="none"/>
  <path d="M580 230 C650 230, 670 230, 720 230" stroke="url(#pathOut)" stroke-width="2" fill="none"/>
  <path d="M580 265 C640 265, 660 345, 720 345" stroke="url(#pathOut)" stroke-width="2" fill="none"/>
  <!-- Arrow heads -->
  <path d="M718 111l6 4-6 4" stroke="#a5b4fc" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M718 226l6 4-6 4" stroke="#a5b4fc" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M718 341l6 4-6 4" stroke="#a5b4fc" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- LABEL: Outputs -->
