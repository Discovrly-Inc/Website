  <g filter="url(#cardShadow)">
    <rect x="726" y="195" width="230" height="70" rx="16" fill="white"/>
    <rect x="726" y="195" width="230" height="70" rx="16" fill="none" stroke="#c7d2fe" stroke-width="1"/>
    <rect x="746" y="211" width="38" height="38" rx="10" fill="#ddd6fe"/>
    <text x="765" y="237" text-anchor="middle" font-size="19" font-family="system-ui">📄</text>
    <text x="800" y="225" font-size="14" font-weight="600" fill="#0f172a" font-family="system-ui">PRDs &amp; Stories</text>
    <text x="800" y="243" font-size="10" fill="#94a3b8" font-family="system-ui">Generated with full context</text>
  </g>

  <!-- Tickets -->
  <g filter="url(#cardShadow)">
    <rect x="726" y="310" width="230" height="70" rx="16" fill="white"/>
    <rect x="726" y="310" width="230" height="70" rx="16" fill="none" stroke="#c7d2fe" stroke-width="1"/>
    <rect x="746" y="326" width="38" height="38" rx="10" fill="#c7d2fe"/>
    <text x="765" y="352" text-anchor="middle" font-size="19" font-family="system-ui">🎫</text>
    <text x="800" y="340" font-size="14" font-weight="600" fill="#0f172a" font-family="system-ui">Jira &amp; Linear Tickets</text>
    <text x="800" y="358" font-size="10" fill="#94a3b8" font-family="system-ui">Ready to assign &amp; ship</text>
