  <!-- SOURCE CARDS (left) -->

  <!-- Slack -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="46" width="192" height="62" rx="14" fill="white"/>
    <rect x="24" y="46" width="192" height="62" rx="14" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="42" y="62" width="30" height="30" rx="7" fill="#4A154B"/>
    <rect x="49" y="69" width="7" height="7" rx="1.5" fill="#E01E5A"/>
    <rect x="58" y="69" width="7" height="7" rx="1.5" fill="#36C5F0"/>
    <rect x="49" y="78" width="7" height="7" rx="1.5" fill="#2EB67D"/>
    <rect x="58" y="78" width="7" height="7" rx="1.5" fill="#ECB22E"/>
    <text x="88" y="73" font-size="13" font-weight="600" fill="#0f172a" font-family="system-ui">Slack</text>
    <text x="88" y="90" font-size="10" fill="#94a3b8" font-family="system-ui">Messages &amp; threads</text>
  </g>

  <!-- Notion -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="126" width="192" height="62" rx="14" fill="white"/>
    <rect x="24" y="126" width="192" height="62" rx="14" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="42" y="142" width="30" height="30" rx="7" fill="#191919"/>
    <text x="57" y="163" text-anchor="middle" font-size="16" font-weight="700" fill="white" font-family="system-ui">N</text>
