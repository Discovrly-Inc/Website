  <!-- OUTPUT CARDS (right) -->

  <!-- Insights -->
  <g filter="url(#cardShadow)">
    <rect x="726" y="80" width="230" height="70" rx="16" fill="white"/>
    <rect x="726" y="80" width="230" height="70" rx="16" fill="none" stroke="#c7d2fe" stroke-width="1"/>
    <rect x="746" y="96" width="38" height="38" rx="10" fill="#e0e7ff"/>
    <text x="765" y="122" text-anchor="middle" font-size="19" font-family="system-ui">💡</text>
    <text x="800" y="110" font-size="14" font-weight="600" fill="#0f172a" font-family="system-ui">Insights &amp; Themes</text>
    <text x="800" y="128" font-size="10" fill="#94a3b8" font-family="system-ui">Auto-synthesized from research</text>
  </g>

